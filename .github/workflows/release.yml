name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release artifact
        run: bash scripts/package-release.sh x86_64-unknown-linux-gnu target/release/cdsync dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdsync-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release artifact
        run: bash scripts/package-release.sh aarch64-unknown-linux-gnu target/release/cdsync dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdsync-linux-arm64
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs:
      - build-linux-x86_64
      - build-linux-arm64
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cdsync-linux-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
